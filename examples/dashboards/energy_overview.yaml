# EG4 Web Monitor - Energy Overview Dashboard
#
# A comprehensive energy monitoring dashboard showing real-time power flow,
# battery status, and daily energy statistics
#
# To use: Copy this configuration to your Lovelace dashboard
# Adjust entity IDs to match your inverter model and serial number:
# replace "flexboss21_1234567890" with "<your_model>_<your_serial>"
# (e.g. 18kpv_3344556677 or 6000xp_3344556677) and
# "grid_boss_1234567890" with your GridBOSS serial. Off-grid models
# (6000XP/12000XP) lack some grid-tie controls shown here (AC charge /
# forced discharge rows) — remove rows whose entities don't exist.
# Check Settings -> Devices & Services -> Entities for the exact IDs
# in your installation; long-standing installs may retain older
# object IDs since Home Assistant preserves registry entries.

type: vertical-stack
cards:
  # Power Flow Card
  - type: custom:power-flow-card-plus
    title: Energy Flow
    entities:
      grid:
        entity: sensor.flexboss21_1234567890_grid_power
        name: Grid
      solar:
        entity: sensor.flexboss21_1234567890_pv_total_power
        name: Solar
      battery:
        entity: sensor.flexboss21_1234567890_battery_power
        state_of_charge: sensor.flexboss21_1234567890_state_of_charge
        name: Battery
      home:
        entity: sensor.flexboss21_1234567890_consumption_power
        name: Home

  # Real-Time Power Metrics
  - type: horizontal-stack
    cards:
      - type: entity
        entity: sensor.flexboss21_1234567890_pv_total_power
        name: Solar Production
        icon: mdi:solar-power
      - type: entity
        entity: sensor.flexboss21_1234567890_grid_power
        name: Grid Power
        icon: mdi:transmission-tower
      - type: entity
        entity: sensor.flexboss21_1234567890_consumption_power
        name: Load Consumption
        icon: mdi:home-lightning-bolt

  # Battery Status
  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.flexboss21_1234567890_state_of_charge
        name: Battery SOC
        min: 0
        max: 100
        severity:
          green: 60
          yellow: 30
          red: 0
      - type: entity
        entity: sensor.flexboss21_1234567890_battery_power
        name: Battery Power
        icon: mdi:battery-charging
      - type: entity
        entity: sensor.flexboss21_1234567890_battery_voltage
        name: Battery Voltage
        icon: mdi:lightning-bolt

  # Daily Energy Statistics
  - type: horizontal-stack
    cards:
      - type: statistic
        entity: sensor.flexboss21_1234567890_yield
        name: Solar Generated Today
        icon: mdi:solar-power
        stat_type: change
      - type: statistic
        entity: sensor.flexboss21_1234567890_consumption
        name: Consumed Today
        icon: mdi:home-import-outline
        stat_type: change
      - type: statistic
        entity: sensor.flexboss21_1234567890_grid_import
        name: Grid Import Today
        icon: mdi:transmission-tower-import
        stat_type: change

  # Historical Charts
  - type: custom:apexcharts-card
    header:
      show: true
      title: Power Flow (24h)
    graph_span: 24h
    series:
      - entity: sensor.flexboss21_1234567890_pv_total_power
        name: Solar
        color: orange
      - entity: sensor.flexboss21_1234567890_grid_power
        name: Grid
        color: blue
      - entity: sensor.flexboss21_1234567890_consumption_power
        name: Load
        color: red
      - entity: sensor.flexboss21_1234567890_battery_power
        name: Battery
        color: green

  # Battery SOC History
  - type: custom:apexcharts-card
    header:
      show: true
      title: Battery SOC (7 days)
    graph_span: 7d
    series:
      - entity: sensor.flexboss21_1234567890_state_of_charge
        name: Battery %
        color: green

  # Grid Status and Frequency
  - type: horizontal-stack
    cards:
      # GridBOSS users: use sensor.grid_boss_SERIAL_off_grid
      # Non-GridBOSS users: create a template binary_sensor (see load_management.yaml)
      - type: entity
        entity: sensor.grid_boss_1234567890_off_grid
        name: Off Grid Status
        icon: mdi:transmission-tower-off
      - type: entity
        entity: sensor.flexboss21_1234567890_grid_frequency
        name: Grid Frequency
        icon: mdi:sine-wave
      - type: entity
        entity: sensor.flexboss21_1234567890_grid_voltage
        name: Grid Voltage
        icon: mdi:lightning-bolt

  # System Controls
  - type: entities
    title: System Controls
    show_header_toggle: false
    entities:
      - entity: select.flexboss21_1234567890_operating_mode
        name: Operating Mode
      - entity: switch.flexboss21_1234567890_ac_charge_mode
        name: Grid Charging (AC Charge)
      - entity: switch.flexboss21_1234567890_forced_discharge_mode
        name: Forced Discharge
      - entity: number.flexboss21_1234567890_ac_charge_power
        name: AC Charge Power
      # Battery control mode (v3.4.0+): SOC-based or Voltage-based regime
      - entity: select.flexboss21_1234567890_battery_charge_control
        name: Battery Charge Control
      - entity: select.flexboss21_1234567890_battery_discharge_control
        name: Battery Discharge Control
      - entity: button.flexboss21_1234567890_refresh_data
        name: Refresh Data
