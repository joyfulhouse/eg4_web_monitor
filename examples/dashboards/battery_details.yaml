# EG4 Web Monitor - Battery Details Dashboard
#
# Detailed battery monitoring including cell voltage aggregates,
# temperatures, and health metrics
#
# NOTE: The EG4 web monitoring API provides aggregate cell voltage data
# (max/min/delta) but does NOT expose individual cell voltages (1-16).
# This is an upstream API limitation.
#
# To use: Copy this configuration to your Lovelace dashboard
# Adjust entity IDs to match your installation:
# - "flexboss21_1234567890" -> "<your_model>_<your_serial>" (e.g. 18kpv_3344556677)
# - "battery_1234567890_01" -> "battery_<your_serial>_01" (individual battery)
# - "battery_bank_1234567890" -> "battery_bank_<your_serial>" (battery bank)
# Check Settings -> Devices & Services -> Entities for the exact IDs.

type: vertical-stack
cards:
  # Battery Overview
  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.flexboss21_1234567890_state_of_charge
        name: State of Charge
        min: 0
        max: 100
        needle: true
        severity:
          green: 60
          yellow: 30
          red: 0
      - type: gauge
        entity: sensor.flexboss21_battery_1234567890_01_state_of_health
        name: State of Health
        min: 0
        max: 100
        needle: true
        severity:
          green: 80
          yellow: 60
          red: 0

  # Battery Metrics
  - type: entities
    title: Battery System
    show_header_toggle: false
    entities:
      - entity: sensor.flexboss21_1234567890_battery_power
        name: Power
        icon: mdi:battery-charging
      - entity: sensor.flexboss21_1234567890_battery_voltage
        name: Voltage
        icon: mdi:lightning-bolt
      - entity: sensor.battery_bank_1234567890_battery_bank_current
        name: Current
        icon: mdi:current-dc
      - type: divider
      - entity: sensor.battery_bank_1234567890_battery_bank_max_cell_temperature
        name: Max Cell Temperature
        icon: mdi:thermometer
      - entity: sensor.flexboss21_battery_1234567890_01_cycle_count
        name: Cycle Count (Battery 1)
        icon: mdi:counter

  # Individual Battery 1 Details
  - type: entities
    title: Battery 1 - Cell Voltage Analysis
    show_header_toggle: false
    entities:
      - entity: sensor.flexboss21_battery_1234567890_01_voltage
        name: Pack Voltage
      - entity: sensor.flexboss21_battery_1234567890_01_current
        name: Pack Current
      - entity: sensor.flexboss21_battery_1234567890_01_real_power
        name: Pack Power
      - type: divider
      - entity: sensor.flexboss21_battery_1234567890_01_max_cell_voltage
        name: Max Cell Voltage
        icon: mdi:arrow-up-bold
      - entity: sensor.flexboss21_battery_1234567890_01_min_cell_voltage
        name: Min Cell Voltage
        icon: mdi:arrow-down-bold
      - entity: sensor.flexboss21_battery_1234567890_01_cell_voltage_delta
        name: Cell Voltage Delta (Imbalance)
        icon: mdi:delta
      - type: divider
      - entity: sensor.flexboss21_battery_1234567890_01_max_voltage_cell_number
        name: Cell # with Max Voltage
        icon: mdi:numeric
      - entity: sensor.flexboss21_battery_1234567890_01_min_voltage_cell_number
        name: Cell # with Min Voltage
        icon: mdi:numeric

  # Cell Temperature Details
  - type: entities
    title: Battery 1 - Cell Temperature Analysis
    show_header_toggle: false
    entities:
      - entity: sensor.flexboss21_battery_1234567890_01_max_cell_temperature
        name: Max Cell Temperature
        icon: mdi:thermometer-high
      - entity: sensor.flexboss21_battery_1234567890_01_min_cell_temperature
        name: Min Cell Temperature
        icon: mdi:thermometer-low
      - entity: sensor.flexboss21_battery_1234567890_01_cell_temperature_delta
        name: Cell Temperature Delta
        icon: mdi:delta

  # Cell Voltage Chart - Using available aggregate data
  - type: custom:apexcharts-card
    header:
      show: true
      title: Cell Voltage Range (6h)
    graph_span: 6h
    series:
      - entity: sensor.flexboss21_battery_1234567890_01_max_cell_voltage
        name: Max Cell
        color: green
      - entity: sensor.flexboss21_battery_1234567890_01_min_cell_voltage
        name: Min Cell
        color: blue
      - entity: sensor.flexboss21_battery_1234567890_01_cell_voltage_delta
        name: Delta
        color: red
        y_axis: secondary
    yaxis:
      - id: primary
        min: 3.0
        max: 3.6
        decimals: 3
      - id: secondary
        opposite: true
        min: 0
        max: 0.1
        decimals: 3

  # Battery Temperature History
  - type: custom:apexcharts-card
    header:
      show: true
      title: Battery Temperature (24h)
    graph_span: 24h
    series:
      - entity: sensor.flexboss21_battery_1234567890_01_max_cell_temperature
        name: Max Temp
        color: red
      - entity: sensor.flexboss21_battery_1234567890_01_min_cell_temperature
        name: Min Temp
        color: blue

  # Battery Power/SOC Chart
  - type: custom:apexcharts-card
    header:
      show: true
      title: Battery Power & SOC (7 days)
    graph_span: 7d
    series:
      - entity: sensor.flexboss21_1234567890_battery_power
        name: Power (W)
        yaxis_id: power
      - entity: sensor.flexboss21_1234567890_state_of_charge
        name: SOC (%)
        yaxis_id: soc
    yaxis:
      - id: power
        min: -5000
        max: 5000
      - id: soc
        opposite: true
        min: 0
        max: 100

  # Battery Health Info Card
  - type: markdown
    title: Cell Voltage Health Guide
    content: |
      **Cell Voltage Delta (Imbalance) Interpretation:**
      - **< 0.020V** - Excellent balance
      - **0.020V - 0.050V** - Good balance
      - **0.050V - 0.100V** - Monitor closely
      - **> 0.100V** - Consider top balancing

      *Note: The EG4 API provides aggregate cell data (max/min/delta)
      but does not expose individual cell voltages.*

  # Battery Controls
  - type: entities
    title: Battery Configuration
    show_header_toggle: false
    entities:
      # SOC limit rows are enabled by default in SOC mode (the default).
      # Voltage-mode installs have them disabled — use/enable the voltage
      # limit entities instead. Tip: System Charge SOC Limit accepts 101
      # for periodic top-balancing (equalization).
      - entity: number.flexboss21_1234567890_on_grid_soc_cut_off
        name: On-Grid SOC Cut-Off (Discharge Floor)
      - entity: number.flexboss21_1234567890_system_charge_soc_limit
        name: System Charge SOC Limit (Charge Ceiling)
      # Battery control mode (v3.4.0+): selects the SOC-based or
      # Voltage-based control regime (not an equalization toggle)
      - entity: select.flexboss21_1234567890_battery_charge_control
        name: Battery Charge Control
      - entity: button.battery_1234567890_01_refresh_data
        name: Refresh Battery Data
