    ParameterReadResponse:
      type: object
      description: |
        Returns flat descriptive named parameter keys (e.g. HOLD_AC_CHARGE_POWER_CMD,
        FUNC_EPS_EN) as extra properties, NOT keyed by register number, plus metadata.
      additionalProperties: true
      properties:
        success:
          type: boolean
        inverterSn:
          type: string
        deviceType:
          type: integer
        startRegister:
          type: integer
        pointNumber:
          type: integer
        valueFrame:
          type: string
          description: base64 LE raw register frame
        inverterRuntimeDeviceTime:
          type: [string, "null"]

    QuickChargeStatus:
      type: object
      properties:
        success:
          type: boolean
        hasUnclosedQuickChargeTask:
          type: boolean
        hasUnclosedQuickDischargeTask:
          type: boolean
          default: false
        remainTimeBeforeQuickChargeStop:
          type: integer
          default: 0
          description: Seconds remaining (0 idle)
        unclosedQuickChargeTaskId:
          type: [integer, "null"]
        unclosedQuickChargeTaskStatus:
          type: [string, "null"]
        lowVoltProtect:
          type: boolean
          default: false
        quickChargeMinute:
          type: [integer, "null"]
          description: HOLD reg234 minutes; only LOCAL/HYBRID transport, null on cloud

    # ---- Firmware ----
    FirmwareUpdateCheck:
      type: object
      properties:
        success:
          type: boolean
        details:
          $ref: "#/components/schemas/FirmwareUpdateDetails"
        infoForwardUrl:
          type: [string, "null"]
          description: Changelog / release-notes URL

    FirmwareUpdateDetails:
      type: object
      properties:
        serialNum:
          type: string
        deviceType:
          type: integer
        standard:
          type: string
        firmwareType:
          type: string
        fwCodeBeforeUpload:
          type: string
          description: Current firmware code (e.g. fAAB-2122) = HA installed_version
        v1:
          type: integer
          description: Current application fw version
        v2:
          type: integer
          description: Current parameter fw version
        v3Value:
          type: integer
        lastV1:
          type: [integer, "null"]
          description: Latest app version (null = up to date)
        lastV1FileName:
          type: [string, "null"]
        lastV2:
          type: [integer, "null"]
        lastV2FileName:
          type: [string, "null"]
        m3Version:
          type: integer
        pcs1UpdateMatch:
          type: boolean
        pcs2UpdateMatch:
          type: boolean
        pcs3UpdateMatch:
          type: boolean
        needRunStep2:
          type: boolean
        needRunStep3:
          type: boolean
        needRunStep4:
          type: boolean
        needRunStep5:
          type: boolean
        midbox:
          type: boolean
        lowVoltBattery:
          type: boolean
        type6:
          type: boolean

    UpdateEligibilityStatus:
      type: object
      properties:
        success:
          type: boolean
        msg:
          $ref: "#/components/schemas/UpdateEligibilityMessage"

    FirmwareUpdateStatus:
      type: object
      properties:
        receiving:
          type: boolean
        progressing:
          type: boolean
        fileReady:
          type: boolean
        deviceInfos:
          type: array
          items:
            $ref: "#/components/schemas/FirmwareDeviceInfo"

    FirmwareDeviceInfo:
      type: object
      properties:
        inverterSn:
          type: string
        startTime:
          type: string
        stopTime:
          type: string
          description: '"" while running'
        standardUpdate:
          type: boolean
        firmware:
          type: string
        firmwareType:
          type: string
        updateStatus:
          $ref: "#/components/schemas/UpdateStatus"
        isSendStartUpdate:
          type: boolean
        isSendEndUpdate:
          type: boolean
        packageIndex:
          type: integer
        updateRate:
          type: string
          description: Progress string, e.g. "50% - 280 / 561"

    # ---- Analytics ----
    DayLineResponse:
      type: object
      description: |
        Time-series for one InverterRuntime attribute over one date. Live-validated
        2026-07-15. ~359 points/day (~4-min cadence), not hourly; `data` is empty when
        no samples exist for that attribute/day. Sample `value` is raw — apply
        attribute-appropriate scaling.
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        xAxis:
          type: string
          description: X-axis type, e.g. "time"
        yAxis:
          type: string
          description: Echoes the requested `attr`
        avgValue:
          type: number
          description: Average (numeric)
        avgValueText:
          type: string
          description: Average, formatted
        maxValueText:
          type: string
          description: Max, formatted
        minValueText:
          type: string
          description: Min, formatted (often empty)
        unit:
          type: string
          description: Unit for the attribute (%, V, W, or "")
        data:
          type: array
          items:
            $ref: "#/components/schemas/DayLinePoint"

    DayLinePoint:
      type: object
      description: One time-series sample. Live-validated 2026-07-15.
      additionalProperties: true
      properties:
        time:
          type: string
          description: Full timestamp string
        year:
          type: integer
        month:
          type: integer
          description: 0-indexed month (Java Calendar; July=6)
        day:
          type: integer
        hour:
          type: integer
        minute:
          type: integer
        second:
          type: integer
        value:
          type: number
          description: Sample value (apply attribute scaling)

    EnergyDayColumnResponse:
      type: object
      description: |
        Hourly energy breakdown (24 buckets) for one day. Live-validated 2026-07-15.
        `energy` raw 0.1 kWh (÷10 → kWh); `energyType` request param is not echoed.
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        invDataMapSize:
          type: integer
          description: Number of energy series present in the day's data map
        data:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              hour:
                type: integer
                description: Hour of day (0-23)
              energy:
                type: integer
                description: Energy in that hour, raw 0.1 kWh

    EnergyMonthColumnResponse:
      type: object
      description: |
        Daily energy breakdown for one month. Live-validated 2026-07-15.
        `energy` raw 0.1 kWh.
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        dayMax:
          type: integer
          description: Days in month
        data:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              day:
                type: integer
                description: Day of month (1-31)
              energy:
                type: integer
                description: Daily energy, raw 0.1 kWh

    EnergyYearColumnResponse:
      type: object
      description: |
        Monthly energy breakdown across one year (12 buckets). Live-validated
        2026-07-15. `energy` raw 0.1 kWh.
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        year:
          type: integer
          description: Echoed year
        data:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              month:
                type: integer
                description: Month (1-indexed here, unlike chart/dayLine's 0-indexed month)
              energy:
                type: integer
                description: Monthly energy, raw 0.1 kWh

    EnergyTotalColumnResponse:
      type: object
      description: |
        Yearly (lifetime) energy breakdown, one bucket per year. Live-validated
        2026-07-15. `energy` raw 0.1 kWh.
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              year:
                type: integer
                description: Calendar year
              energy:
                type: integer
                description: Yearly energy, raw 0.1 kWh

    EventListResponse:
      type: object
      description: |
        Paginated fault/warning/event log for a device. Live-validated 2026-07-15.
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        total:
          type: integer
          description: Total events matching
        rows:
          type: array
          items:
            $ref: "#/components/schemas/EventRow"

    EventRow:
      type: object
      description: One event-log record. Live-validated 2026-07-15.
      additionalProperties: true
      properties:
        recordId:
          type: integer
          description: Event record id
        serialNum:
          type: string
          description: Device serial
        datalogSn:
          type: string
          description: Dongle serial
        plantName:
          type: string
          description: Station name
        event:
          type: string
          description: Event code (E###=fault, W###=warning)
        eventText:
          type: string
          description: Human-readable description
        eventType:
          type: string
          enum: [FAULT, WARNING, INFO]
          description: Category enum
        eventTypeText:
          type: string
          description: Localized category, e.g. Fault / Notice
        status:
          type: string
          enum: [OPEN, CLOSE]
          description: Event state (OPEN=active, CLOSE=resolved)
        faultDuration:
          type: string
          description: Duration in hours (string)
        startTime:
          type: string
          description: Start (dash format)
        startSlashTime:
          type: string
          description: Start (slash format)
        renormalTime:
          type: [string, "null"]
          description: Return-to-normal (dash)
        renormalSlashTime:
          type: [string, "null"]
          description: Return-to-normal (slash)

    MonthlyEnergyHistoryResponse:
      type: object
      description: |
        SDK reads `success` + `data` (list of daily row dicts) and builds
        MonthlyEnergyHistory. Day number = row `day` field if int 1-31 else 1-based row
        position. Raw daily fields are 0.1 kWh (÷10 → kWh).
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/DailyEnergyHistoryEntry"

    DailyEnergyHistoryEntry:
      type: object
      description: |
        Only these known fields are extracted (extras ignored). Availability varies by
        endpoint (single-inverter monthColumn vs monthColumnParallel). All energy raw
        0.1 kWh.
      additionalProperties: true
      properties:
        day:
          type: integer
          description: 1-based day of month
        ePvDay:
          type: [number, "null"]
          description: Total PV (parallel)
        ePv1Day:
          type: [number, "null"]
        ePv2Day:
          type: [number, "null"]
        ePv3Day:
          type: [number, "null"]
        eInvDay:
          type: [number, "null"]
          description: Inverter output (yield)
        eRecDay:
          type: [number, "null"]
          description: AC charge (rectifier)
        eChgDay:
          type: [number, "null"]
        eDisChgDay:
          type: [number, "null"]
        eEpsDay:
          type: [number, "null"]
        eToGridDay:
          type: [number, "null"]
          description: Grid export (single, preferred)
        eExportDay:
          type: [number, "null"]
          description: Grid export (parallel, fallback)
        eToUserDay:
          type: [number, "null"]
          description: Grid import (single, fallback)
        eImportDay:
          type: [number, "null"]
          description: Grid import (parallel, preferred)
        eConsumptionDay:
          type: [number, "null"]
        eGenDay:
          type: [number, "null"]
          description: Generator-port energy (parallel)

    # ---- Forecasting ----
    SolarForecastResponse:
      type: object
      description: |
        Solar-production forecast (today vs tomorrow) for a parallel group, in hourly
        buckets. Live-validated 2026-07-15. Energy values raw 0.1 kWh (÷10 → kWh).
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        localDate:
          type: string
          description: Plant-local date of the forecast (YYYY-MM-DD)
        solarEnergys:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              hour:
                type: integer
                description: Hour of day (plant-local, 0-23)
              todaySolarEnergy:
                type: integer
                description: Predicted PV energy this hour, today (raw 0.1 kWh)
              tomorrowSolarEnergy:
                type: integer
                description: Predicted PV energy this hour, tomorrow (raw 0.1 kWh)

    WeatherForecastResponse:
      type: object
      description: |
        Flat Visual-Crossing-style weather payload for the plant location, with an
        embedded PV-prediction summary and NWS-style alerts. Live-validated 2026-07-15.
        Latitude/longitude ARE exposed here (unlike plant/details).
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        latitude:
          type: number
          description: Plant latitude
        longitude:
          type: number
          description: Plant longitude
        resolvedAddress:
          type: string
          description: Resolved address (coords)
        address:
          type: string
          description: Query address (coords)
        plantCity:
          type: string
          description: Human city label
        timezone:
          type: string
          description: IANA timezone
        tzoffset:
          type: number
          description: TZ offset hours
        localDate:
          type: string
          description: Plant-local today (YYYY-MM-DD)
        localTomorrowDate:
          type: string
          description: Plant-local tomorrow (YYYY-MM-DD)
        ePvPredict:
          type: object
          additionalProperties: true
          description: PV prediction summary. Energy raw 0.1 kWh.
          properties:
            success:
              type: string
              description: String, not bool (e.g. "True")
            todayPvEnergy:
              type: integer
              description: Predicted total PV today, raw 0.1 kWh
            tomorrowPvEnergy:
              type: integer
              description: Predicted total PV tomorrow, raw 0.1 kWh
        days:
          type: array
          items:
            $ref: "#/components/schemas/WeatherDay"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/WeatherAlert"

    WeatherDay:
      type: object
      description: |
        One daily forecast entry. Live-validated 2026-07-15. Temperature fields are
        pre-formatted strings with unit (e.g. "98.1 ℉"); humidity/wind/radiation are
        floats.
      additionalProperties: true
      properties:
        datetime:
          type: string
          description: Date (YYYY-MM-DD)
        datetimeEpoch:
          type: integer
          description: Unix epoch (s)
        tempmax:
          type: string
          description: Max temp (formatted with unit)
        tempmin:
          type: string
          description: Min temp (formatted with unit)
        temp:
          type: string
          description: Mean temp (formatted with unit)
        humidity:
          type: number
          description: Relative humidity %
        precipprob:
          type: number
          description: Precipitation probability %
        windspeed:
          type: number
        solarradiation:
          type: number
          description: Solar radiation (W/m²)
        solarenergy:
          type: number
          description: Solar energy (MJ/m²)
        sunrise:
          type: string
          description: Sunrise local time
        sunset:
          type: string
          description: Sunset local time
        conditions:
          type: string
          description: Condition text
        icon:
          type: string
          description: Icon slug
        iconNew:
          type: string
          description: Icon slug (alt)
        isDaytime:
          type: boolean
        conditionsType:
          type: string
          description: Internal condition type code

    WeatherAlert:
      type: object
      description: One weather alert (NWS-style). Live-validated 2026-07-15.
      additionalProperties: true
      properties:
        event:
          type: string
          description: Alert name
        headline:
          type: string
        description:
          type: string
          description: Full alert text
        onset:
          type: string
          description: Start
        onsetEpoch:
          type: integer
          description: Start epoch
        ends:
          type: string
          description: End
        endsEpoch:
          type: integer
          description: End epoch
        id:
          type: string
          description: Alert id (NWS urn)
        language:
          type: string
        link:
          type: string
          description: Source link
        level:
          type: string
          description: Severity (e.g. RED)
        hazardType:
          type: string
          description: Hazard category
