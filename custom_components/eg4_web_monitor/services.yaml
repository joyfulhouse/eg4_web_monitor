refresh_data:
  name: Refresh EG4 Data
  description: Force refresh of all EG4 inverter data from the API
  fields:
    entry_id:
      name: Config Entry ID
      description: The configuration entry ID to refresh (optional, refreshes all if not specified)
      required: false
      selector:
        text:

reconcile_history:
  name: Reconcile Energy History
  description: >-
    Backfill missing energy statistics from the EG4 cloud API.
    This service fetches historical energy data and imports it into Home Assistant's
    statistics database for any gaps in your energy sensor history.
    Requires cloud credentials (HTTP or Hybrid connection mode).
  fields:
    lookback_hours:
      name: Lookback Hours
      description: "Number of hours to look back for gaps (default: 48)"
      required: false
      default: 48
      selector:
        number:
          min: 1
          max: 8760
          step: 1
          mode: box
          unit_of_measurement: hours
    start_date:
      name: Start Date
      description: Explicit start date (YYYY-MM-DD). If provided, end_date is also required.
      required: false
      example: "2025-01-01"
      selector:
        date:
    end_date:
      name: End Date
      description: Explicit end date (YYYY-MM-DD). If provided, start_date is also required.
      required: false
      example: "2025-01-31"
      selector:
        date:
    entry_id:
      name: Config Entry ID
      description: The configuration entry ID to reconcile (optional, reconciles all if not specified)
      required: false
      selector:
        text:

import_historical_data:
  name: Import Historical Data
  description: >-
    Import plant-level daily energy history (PV yield, consumption, grid
    import/export, battery charge/discharge) from the EG4 cloud into
    Home Assistant long-term statistics. Data is written as separate
    external statistics (eg4_web_monitor:plant_..._...) that can be selected
    in the Energy dashboard; existing sensor history is never modified.
    Re-running the same or overlapping ranges is safe (no double counting).
    Requires cloud credentials (HTTP or Hybrid connection mode).
  fields:
    config_entry:
      name: Config Entry
      description: The EG4 Web Monitor configuration entry (plant) to import history for.
      required: true
      selector:
        config_entry:
          integration: eg4_web_monitor
    start_date:
      name: Start Date
      description: First day to import (YYYY-MM-DD).
      required: true
      example: "2024-01-01"
      selector:
        date:
    end_date:
      name: End Date
      description: "Last day to import (YYYY-MM-DD). Defaults to today. Maximum range: 2 years."
      required: false
      example: "2024-12-31"
      selector:
        date:
    dry_run:
      name: Dry Run
      description: Preview what would be imported without writing any statistics.
      required: false
      default: false
      selector:
        boolean:
